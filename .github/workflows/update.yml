name: Update Fuel Prices
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # Correction ici: 'python-version' au lieu de 'python-code'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python update_prices.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'PriceBot'
          git config --global user.email 'bot@github.com'
          git add prix.json
          git commit -m "Mise à jour des prix" || exit 0
          git push
