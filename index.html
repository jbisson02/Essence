<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence Sherbrooke</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; text-align: center; padding: 20px; }
        .stats-bar { 
            display: flex; justify-content: space-around; 
            background: #34495e; color: white; padding: 15px; 
            border-radius: 10px; margin-bottom: 25px; max-width: 400px; margin-left: auto; margin-right: auto;
        }
        .stat-item { flex: 1; }
        .stat-value { font-weight: bold; font-size: 1.2rem; display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }
        
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .card { 
            background: white; padding: 20px; border-radius: 10px; 
            width: 90%; max-width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 10px solid #007bff;
        }
        .price { font-size: 2.2rem; color: #27ae60; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>⛽ Essence Sherbrooke</h1>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label">Minimum (QC)</span>
            <span id="min-price" class="stat-value">--</span>
        </div>
        <div class="stat-item" style="border-left: 1px solid #555;">
            <span class="stat-label">Maximum (QC)</span>
            <span id="max-price" class="stat-value">--</span>
        </div>
    </div>
    
    <div id="display" class="container">
        <p>Chargement...</p>
    </div>

    <script>
        async function loadPrices() {
            try {
                const res = await fetch('./prix.json?t=' + Date.now());
                const data = await res.json();
                
                // Affichage des stats
                document.getElementById('min-price').innerText = data.stats.min;
                document.getElementById('max-price').innerText = data.stats.max;

                // Affichage des stations
                let html = "";
                data.stations.forEach(item => {
                    html += `
                        <div class="card">
                            <strong>${item.nom}</strong><br>
                            <small>${item.adresse}</small>
                            <div class="price">${item.prix}</div>
                        </div>
                    `;
                });
                document.getElementById('display').innerHTML = html;

            } catch (error) {
                document.getElementById('display').innerHTML = "Erreur de chargement des données.";
            }
        }

        loadPrices();
        setInterval(loadPrices, 300000);
    </script>
</body>
</html>
