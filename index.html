<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence par Ville</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 10px; }
        .city-section { margin-top: 30px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; }
        .city-title { 
            background: #2c3e50; color: white; padding: 10px; 
            border-radius: 5px; font-size: 1.2rem; margin-bottom: 15px;
        }
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 0 auto 20px auto; }
        .stat-card { background: #34495e; color: white; padding: 10px; border-radius: 8px; font-size: 0.75rem; text-align: center; }
        .card { 
            background: white; padding: 15px; border-radius: 8px; 
            margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 8px solid #007bff;
        }
        .price { font-size: 1.8rem; color: #2ecc71; font-weight: bold; float: right; }
        .clear { clear: both; }
    </style>
</head>
<body>
    <h1>⛽ Prix par Ville</h1>
    <div id="file-date" style="font-size: 0.8rem; margin-bottom: 20px;">Chargement...</div>

    <div class="stats-container" id="stats-area"></div>
    <div id="display"></div>

    <script>
        async function loadPrices() {
            try {
                const res = await fetch('./prix.json?t=' + Date.now());
                const data = await res.json();
                
                document.getElementById('file-date').innerText = "Données du : " + new Date(data.file_generated_at).toLocaleString('fr-CA');

                // Affichage Stats
                document.getElementById('stats-area').innerHTML = `
                    <div class="stat-card"><b>MIN QC</b><br>${data.stats.min.prix}<br><small>${data.stats.min.nom}</small></div>
                    <div class="stat-card"><b>MAX QC</b><br>${data.stats.max.prix}<br><small>${data.stats.max.nom}</small></div>
                `;

                // Affichage par Ville
                let html = "";
                for (const ville in data.villes) {
                    html += `<div class="city-section">
                                <div class="city-title">${ville}</div>`;
                    
                    data.villes[ville].forEach(item => {
                        html += `
                            <div class="card">
                                <span class="price">${item.prix}</span>
                                <strong>${item.nom}</strong><br>
                                <small>${item.adresse}</small>
                                <div class="clear"></div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                document.getElementById('display').innerHTML = html;

            } catch (error) {
                document.getElementById('display').innerHTML = "Erreur de chargement.";
            }
        }
        loadPrices();
        setInterval(loadPrices, 300000);
    </script>
</body>
</html>
